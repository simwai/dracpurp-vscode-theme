$schema: vscode://schemas/color-theme
name: Dracpurp
author: simwai
maintainers:
  - simwai
semanticClass: theme.dracpurp
semanticHighlighting: true
dracula:
  base:
    - &BG '#100e12'
    - &FG '#e8e8e8'
    - &SELECTION '#2d074496'
    - &COMMENT '#817B93'
    - &CYAN '#A8B4C3'
    - &GREEN '#A1D3A9'
    - &ORANGE '#DEAC77'
    - &PINK '#F272BE'
    - &PURPLE '#B2A1E5'
    - &RED '#FF5555'
    - &YELLOW '#CEC8B9'
  ansi:
    - &COLOR0 '#11021a'
    - &COLOR1 '#FF8585'
    - &COLOR2 '#3EC25F'
    - &COLOR3 '#DE9C3E'
    - &COLOR4 '#C095FC'
    - &COLOR5 '#FF79C6'
    - &COLOR6 '#6CB5C4'
    - &COLOR7 '#e8e8e8'
    - &COLOR8 '#8b6b9e'
    - &COLOR9 '#FF8585'
    - &COLOR10 '#3EC25F'
    - &COLOR11 '#DE9C3E'
    - &COLOR12 '#FF79C6'
    - &COLOR13 '#FF79C6'
    - &COLOR14 '#6CB5C4'
    - &COLOR15 '#ffffff'
  brightOther:
    - &TEMP_QUOTES '#AAB063'
    - &TEMP_PROPERTY_QUOTES '#6CB5C4'
  other:
    - &LineHighlight '#2d074480'
    - &NonText '#35094e40'
    - &WHITE '#ffffff'
    - &TAB_DROP_BG '#2d074460'
    - &BGLighter '#1b0429'
    - &BGLight '#11021a'
    - &BGDark '#100e12'
    - &BGDarker '#0e0217'

colors:
  editor.background: *BG
  editor.foreground: *FG

tokenColors:
  - name: Workhorse (Variables, Strings, Numbers)
    scope:
      - variable
      - variable.other.readwrite
      - variable.other.object
      - variable.other.property
      - support.variable.property
      - string
      - constant.numeric
      - constant.language
      - constant.other
      - constant.other.key.perl
    settings:
      foreground: *YELLOW

  - name: Logic (Functions and Methods)
    scope:
      - entity.name.function
      - support.function
    settings:
      foreground: *GREEN

  - name: Skeleton (Keywords)
    scope:
      - keyword
      - storage.type
      - storage.modifier
    settings:
      foreground: *PINK

  - name: Parameters
    scope:
      - variable.parameter
      - entity.name.variable.parameter
    settings:
      foreground: *ORANGE

  - name: Classes and Structures
    scope:
      - entity.name.type.class
      - entity.name.type.module
      - entity.name.type.namespace
    settings:
      foreground: *PURPLE

  - name: Types and Enums
    scope:
      - entity.name.type
      - support.type
      - entity.name.type.interface
      - entity.name.type.enum
      - entity.name.type.struct
    settings:
      foreground: *CYAN

  - name: Comments
    scope:
      - comment
      - punctuation.definition.comment
    settings:
      foreground: *COMMENT

  - name: CSS / SCSS function calls (Fallback)
    scope:
      - support.function
      - entity.name.function
    settings:
      foreground: *GREEN
