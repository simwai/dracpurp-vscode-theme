<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11021a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b0429;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#grad1)" />

  <!-- Cyberpunk grid lines -->
  <g stroke="#a025e7" stroke-width="0.5" opacity="0.3">
    <path d="M0 50 L1200 50 M0 100 L1200 100 M0 150 L1200 150 M0 200 L1200 200 M0 250 L1200 250" />
    <path d="M50 0 L50 300 M100 0 L100 300 M150 0 L150 300 M200 0 L200 300 M250 0 L250 300 M300 0 L300 300 M350 0 L350 300 M400 0 L400 300 M450 0 L450 300 M500 0 L500 300 M550 0 L550 300 M600 0 L600 300 M650 0 L650 300 M700 0 L700 300 M750 0 L750 300 M800 0 L800 300 M850 0 L850 300 M900 0 L900 300 M950 0 L950 300 M1000 0 L1000 300 M1050 0 L1050 300 M1100 0 L1100 300 M1150 0 L1150 300" />
  </g>

  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#b83dff" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">DRACPURP</text>
  <text x="50%" y="70%" font-family="Arial, sans-serif" font-size="20" fill="#e8e8e8" text-anchor="middle" dominant-baseline="middle" opacity="0.8">THE DARK PURPLE EVOLUTION</text>

  <rect x="0" y="290" width="1200" height="10" fill="#a025e7" />
  <rect x="0" y="0" width="1200" height="10" fill="#a025e7" />
</svg>
