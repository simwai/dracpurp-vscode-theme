    <clipPath id="circleClip">
      <circle cx="128" cy="128" r="120" />
    </clipPath>
  </defs>

  <!-- Hexagon background -->
  <path d="M128 20 L220 73 L220 183 L128 236 L36 183 L36 73 Z" fill="#100e12" stroke="#a025e7" stroke-width="8" filter="url(#neonGlow)" />

